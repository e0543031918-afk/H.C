<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>STUDIO ✂️ — אפליקציה למעצבי שער</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f4f5f7; --surface:#ffffff; --surface-2:#f0f1f4;
    --text:#16181d; --text-soft:#7c828c; --line:#e7e9ee;
    --brand:#16181d; --brand-soft:#f0f1f4; --accent:#16181d;
    --on-brand:#ffffff; --shadow:0 10px 30px rgba(20,22,28,.08);
    --radius:22px; --font:'Heebo',sans-serif; --danger:#e0467c;
  }
  [data-theme="vivid"]{
    --bg:#fbf3ff; --surface:#ffffff; --surface-2:#f7ecff;
    --text:#2a1340; --text-soft:#9a7bb5; --line:#f0e3fb;
    --brand:linear-gradient(135deg,#ff5fa2,#a44cff); --brand-soft:#fbe9f5;
    --accent:#d6379a; --on-brand:#ffffff; --shadow:0 14px 36px rgba(164,76,255,.20);
    --radius:26px;
  }
  [data-theme="luxe"]{
    --bg:#15130f; --surface:#1f1c16; --surface-2:#2a261e;
    --text:#f3ead7; --text-soft:#b3a489; --line:#352f24;
    --brand:linear-gradient(135deg,#d9b25a,#b8893a); --brand-soft:#2a2419;
    --accent:#d9b25a; --on-brand:#15130f; --shadow:0 16px 40px rgba(0,0,0,.5);
    --radius:18px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{font-family:var(--font);background:var(--bg);color:var(--text);overflow:hidden;
    transition:background .3s}
  button{font-family:var(--font);cursor:pointer}

  .app{max-width:480px;margin:0 auto;height:100vh;height:100dvh;background:var(--bg);
    display:flex;flex-direction:column;position:relative;overflow:hidden;transition:background .3s}

  .topbar{display:flex;align-items:center;justify-content:space-between;padding:18px 20px 14px}
  .topbar .hi{font-size:13px;color:var(--text-soft);font-weight:500}
  .topbar .name{font-size:21px;font-weight:900;color:var(--text);letter-spacing:-.4px}
  .topbar-right{display:flex;align-items:center;gap:10px}
  .avatar{width:46px;height:46px;border-radius:50%;background:var(--brand);display:flex;
    align-items:center;justify-content:center;color:var(--on-brand);font-weight:900;font-size:17px}
  .theme-dot{width:30px;height:30px;border-radius:50%;border:2px solid var(--line);
    background:var(--brand)}

  .scroll{flex:1;overflow-y:auto;padding:0 18px 24px;scrollbar-width:none}
  .scroll::-webkit-scrollbar{display:none}

  .page{display:none;animation:fade .3s ease}
  .page.on{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

  .sec-title{font-size:16px;font-weight:800;color:var(--text);margin:20px 4px 12px;
    display:flex;align-items:center;justify-content:space-between}
  .sec-title button{font-size:12px;color:var(--accent);font-weight:700;background:none;border:none}

  .card{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);
    border:1px solid var(--line)}

  .stat-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .stat{padding:16px;border-radius:var(--radius)}
  .stat .v{font-size:24px;font-weight:900;color:var(--text)}
  .stat .l{font-size:12px;color:var(--text-soft);font-weight:600;margin-top:2px}
  .stat .chip{display:inline-block;font-size:10px;font-weight:800;padding:2px 8px;border-radius:20px;
    background:var(--brand-soft);color:var(--accent);margin-top:8px}

  .hero{background:var(--brand);color:var(--on-brand);padding:22px;border-radius:var(--radius);
    position:relative;overflow:hidden}
  .hero h3{font-size:13px;font-weight:600;opacity:.85}
  .hero .big{font-size:30px;font-weight:900;margin:4px 0 10px}
  .hero .mini{font-size:12px;opacity:.9;display:flex;gap:14px;flex-wrap:wrap}
  .hero .deco{position:absolute;left:-30px;bottom:-40px;width:140px;height:140px;border-radius:50%;
    background:rgba(255,255,255,.12)}

  .appt{display:flex;align-items:center;gap:12px;padding:13px 14px;margin-bottom:10px}
  .appt .time{display:flex;flex-direction:column;align-items:center;min-width:50px}
  .appt .time b{font-size:15px;font-weight:900;color:var(--text)}
  .appt .time span{font-size:10px;color:var(--text-soft)}
  .appt .ci{width:42px;height:42px;border-radius:13px;background:var(--brand-soft);display:flex;
    align-items:center;justify-content:center;font-weight:800;color:var(--accent);font-size:14px;flex-shrink:0}
  .appt .info{flex:1;min-width:0}
  .appt .info b{font-size:14px;font-weight:800;color:var(--text);display:block}
  .appt .info span{font-size:12px;color:var(--text-soft)}
  .appt .price{font-size:13px;font-weight:900;color:var(--text);white-space:nowrap}
  .appt.done{opacity:.5}
  .appt.done .info b{text-decoration:line-through}
  .row-actions{display:flex;gap:6px;margin-top:8px}
  .mini-btn{font-size:11px;font-weight:700;padding:5px 11px;border-radius:20px;border:1px solid var(--line);
    background:var(--surface);color:var(--text-soft)}
  .mini-btn.ok{color:var(--accent);border-color:var(--accent)}
  .mini-btn.del{color:var(--danger);border-color:var(--danger)}

  .empty{text-align:center;color:var(--text-soft);font-size:13px;padding:30px 10px}

  .week{display:flex;gap:8px;margin-bottom:8px;overflow-x:auto;padding-bottom:4px}
  .day{min-width:46px;text-align:center;padding:10px 6px;border-radius:16px;background:var(--surface);
    border:1px solid var(--line);transition:.2s;flex-shrink:0}
  .day span{font-size:11px;color:var(--text-soft);font-weight:600}
  .day b{font-size:17px;font-weight:900;color:var(--text);display:block;margin-top:3px}
  .day .cnt{font-size:9px;color:var(--accent);font-weight:800;margin-top:2px;min-height:11px}
  .day.on{background:var(--brand);border-color:transparent}
  .day.on span,.day.on b,.day.on .cnt{color:var(--on-brand)}

  .pf-tabs{display:flex;gap:8px;margin-bottom:14px;overflow-x:auto;padding-bottom:4px}
  .pf-tab{font-size:12px;font-weight:700;padding:8px 15px;border-radius:30px;background:var(--surface);
    border:1px solid var(--line);color:var(--text-soft);white-space:nowrap;flex-shrink:0}
  .pf-tab.on{background:var(--brand);color:var(--on-brand);border-color:transparent}
  .gallery{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .shot{border-radius:var(--radius);overflow:hidden;position:relative;height:160px;border:none;padding:0}
  .shot .ph{width:100%;height:100%}
  .shot .cap{position:absolute;bottom:0;right:0;left:0;padding:20px 12px 10px;text-align:right;
    background:linear-gradient(transparent,rgba(0,0,0,.65));color:#fff}
  .shot .cap b{font-size:13px;font-weight:800;display:block}
  .shot .cap span{font-size:11px;opacity:.9}
  .shot .x{position:absolute;top:8px;left:8px;width:26px;height:26px;border-radius:50%;
    background:rgba(0,0,0,.5);color:#fff;border:none;font-size:15px;line-height:1}

  .bars{display:flex;align-items:flex-end;gap:9px;height:120px;padding:14px 4px 0}
  .bars .bar{flex:1;background:var(--brand);border-radius:8px 8px 4px 4px;position:relative;min-height:6px;
    transition:height .4s}
  .bars .bar span{position:absolute;bottom:-20px;right:0;left:0;text-align:center;font-size:10px;
    color:var(--text-soft);font-weight:700}
  .inv{display:flex;align-items:center;gap:12px;padding:13px 14px;border-bottom:1px solid var(--line)}
  .inv:last-child{border-bottom:none}
  .inv .ic{width:40px;height:40px;border-radius:12px;background:var(--brand-soft);display:flex;
    align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
  .inv .info{flex:1;min-width:0}
  .inv .info b{font-size:14px;font-weight:800;color:var(--text);display:block}
  .inv .info span{font-size:11px;color:var(--text-soft)}
  .bar-mini{height:6px;background:var(--surface-2);border-radius:6px;margin-top:6px;overflow:hidden}
  .bar-mini i{display:block;height:100%;background:var(--accent);border-radius:6px;transition:width .3s}
  .low{color:var(--danger) !important;font-weight:800}
  .inv-btns{display:flex;flex-direction:column;gap:5px}
  .stepper{width:28px;height:28px;border-radius:9px;border:1px solid var(--line);background:var(--surface);
    font-size:16px;font-weight:800;color:var(--text);line-height:1}

  .faces{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:6px}
  .face{padding:14px 6px;border-radius:18px;background:var(--surface);border:1.5px solid var(--line);
    text-align:center;transition:.2s}
  .face.on{border-color:var(--accent);background:var(--brand-soft)}
  .face svg{width:36px;height:44px}
  .face span{display:block;font-size:11px;font-weight:700;color:var(--text);margin-top:5px}
  .reco{display:flex;gap:13px;padding:14px;margin-bottom:10px;align-items:center}
  .reco .ph{width:60px;height:60px;border-radius:16px;flex-shrink:0}
  .reco .info{flex:1}
  .reco .info b{font-size:14px;font-weight:800;color:var(--text);display:block}
  .reco .info p{font-size:12px;color:var(--text-soft);margin-top:3px;line-height:1.4}
  .match{font-size:11px;font-weight:900;color:var(--accent);background:var(--brand-soft);
    padding:5px 9px;border-radius:30px;white-space:nowrap}

  .btn{display:block;width:100%;background:var(--brand);color:var(--on-brand);border:none;
    padding:15px;border-radius:18px;font-size:15px;font-weight:800;margin-top:16px}
  .btn.ghost{background:var(--surface);color:var(--text);border:1px solid var(--line)}

  .nav{display:flex;justify-content:space-around;padding:10px 8px max(10px,env(safe-area-inset-bottom));
    background:var(--surface);border-top:1px solid var(--line)}
  .nav button{background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:4px;
    color:var(--text-soft);font-size:10px;font-weight:700;flex:1;transition:.2s}
  .nav button svg{width:23px;height:23px;stroke:currentColor;fill:none;stroke-width:2;
    stroke-linecap:round;stroke-linejoin:round}
  .nav button.on{color:var(--accent)}

  .fab{position:absolute;bottom:78px;left:20px;width:56px;height:56px;border-radius:50%;
    background:var(--brand);color:var(--on-brand);border:none;font-size:28px;box-shadow:var(--shadow);
    z-index:30;display:flex;align-items:center;justify-content:center}

  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:flex-end;
    justify-content:center;z-index:100}
  .modal-bg.on{display:flex}
  .modal{background:var(--surface);width:100%;max-width:480px;border-radius:28px 28px 0 0;padding:22px 20px;
    max-height:88vh;overflow-y:auto;animation:up .3s ease}
  @keyframes up{from{transform:translateY(100%)}to{transform:none}}
  .modal h2{font-size:19px;font-weight:900;color:var(--text);margin-bottom:4px}
  .modal .sub{font-size:13px;color:var(--text-soft);margin-bottom:16px}
  .field{margin-bottom:13px}
  .field label{display:block;font-size:12px;font-weight:700;color:var(--text);margin-bottom:6px}
  .field input,.field select{width:100%;padding:13px;border:1px solid var(--line);border-radius:14px;
    font-family:var(--font);font-size:15px;background:var(--bg);color:var(--text)}
  .field input:focus,.field select:focus{outline:2px solid var(--accent);border-color:transparent}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .swatches{display:flex;gap:8px;flex-wrap:wrap}
  .sw{width:38px;height:38px;border-radius:12px;border:2px solid transparent}
  .sw.on{border-color:var(--text)}

  .toast{position:fixed;bottom:92px;left:50%;transform:translateX(-50%) translateY(20px);
    background:var(--text);color:var(--bg);padding:12px 20px;border-radius:30px;font-size:13px;
    font-weight:700;opacity:0;transition:.3s;z-index:200;pointer-events:none;white-space:nowrap}
  .toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="app" id="app" data-theme="clean">

  <div class="topbar">
    <div>
      <div class="hi" id="greet">בוקר טוב 👋</div>
      <div class="name">מאיה כהן</div>
    </div>
    <div class="topbar-right">
      <button class="theme-dot" id="themeDot" title="החלף עיצוב" onclick="cycleTheme()"></button>
      <div class="avatar">מ</div>
    </div>
  </div>

  <div class="scroll" id="scroll">
    <div class="page on" id="p-home"></div>
    <div class="page" id="p-cal"></div>
    <div class="page" id="p-port"></div>
    <div class="page" id="p-biz"></div>
    <div class="page" id="p-style"></div>
  </div>

  <button class="fab" id="fab" onclick="fabAction()">+</button>

  <div class="nav">
    <button class="on" data-p="home" onclick="go('home')">
      <svg viewBox="0 0 24 24"><path d="M3 10l9-7 9 7v9a2 2 0 0 1-2 2h-4v-6h-6v6H5a2 2 0 0 1-2-2z"/></svg>בית</button>
    <button data-p="cal" onclick="go('cal')">
      <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="3"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>יומן</button>
    <button data-p="port" onclick="go('port')">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>פורטפוליו</button>
    <button data-p="biz" onclick="go('biz')">
      <svg viewBox="0 0 24 24"><path d="M3 3v18h18"/><path d="M7 14l4-4 3 3 5-6"/></svg>העסק</button>
    <button data-p="style" onclick="go('style')">
      <svg viewBox="0 0 24 24"><path d="M12 2a7 7 0 0 0-7 7c0 3 2 4 2 7a3 3 0 0 0 6 0c0-1 1-2 2.5-2.5"/><circle cx="17" cy="14" r="3"/></svg>סגנון</button>
  </div>

  <div class="modal-bg" id="modalBg" onclick="if(event.target===this)closeModal()">
    <div class="modal" id="modal"></div>
  </div>
  <div class="toast" id="toast"></div>
</div>

<script>
const GRADS = [
  'linear-gradient(135deg,#f6a5c0,#a855f7)','linear-gradient(135deg,#fcb045,#fd1d1d)',
  'linear-gradient(135deg,#43cea2,#185a9d)','linear-gradient(135deg,#30cfd0,#330867)',
  'linear-gradient(135deg,#ee9ca7,#ffdde1)','linear-gradient(135deg,#c79081,#dfa579)',
  'linear-gradient(135deg,#667eea,#764ba2)','linear-gradient(135deg,#f7971e,#ffd200)'
];
const THEMES = ['clean','vivid','luxe'];
const todayISO = new Date().toISOString().slice(0,10);

const SEED = {
  theme:'clean',
  appointments:[
    {id:1, name:'דנה לוי', service:'צבע + פן', date:todayISO, time:'10:30', dur:45, price:320, done:false},
    {id:2, name:'יעל ברק', service:'תספורת + עיצוב', date:todayISO, time:'12:00', dur:30, price:150, done:false},
    {id:3, name:'רוני אדם', service:'החלקה', date:todayISO, time:'14:15', dur:90, price:580, done:false},
    {id:4, name:'נועה גל', service:'גוונים', date:todayISO, time:'16:00', dur:60, price:410, done:false}
  ],
  portfolio:[
    {id:1, title:"באלייאז' חום-זהב", cat:'צבע', grad:GRADS[0]},
    {id:2, title:'קופי נחושת', cat:'צבע', grad:GRADS[1]},
    {id:3, title:'בוב קלאסי', cat:'תספורות', grad:GRADS[2]},
    {id:4, title:'תסרוקת כלה', cat:'אירועים', grad:GRADS[3]},
    {id:5, title:'בלונד פלטינה', cat:'צבע', grad:GRADS[4]},
    {id:6, title:'גלים רכים', cat:'תספורות', grad:GRADS[5]}
  ],
  inventory:[
    {id:1, name:'צבע 7.3 זהב', icon:'🧴', qty:12, max:20},
    {id:2, name:'מחמצן 9%', icon:'🧪', qty:2, max:18},
    {id:3, name:'מסכת קרטין', icon:'💆‍♀️', qty:8, max:18},
    {id:4, name:'שמפו מקצועי', icon:'🧴', qty:15, max:24}
  ]
};

let S = load();
function load(){
  try{ const r = localStorage.getItem('studio_v1'); if(r) return JSON.parse(r); }catch(e){}
  return JSON.parse(JSON.stringify(SEED));
}
function save(){ try{ localStorage.setItem('studio_v1', JSON.stringify(S)); }catch(e){} }
const nid = list => list.reduce((m,x)=>Math.max(m,x.id),0)+1;
const ils = n => '₪'+Number(n).toLocaleString('he-IL');

let current='home', selDay=todayISO, pfFilter='הכל', faceSel='אובלי', pickedGrad=GRADS[0];

function go(p){
  document.querySelectorAll('.page').forEach(el=>el.classList.remove('on'));
  document.getElementById('p-'+p).classList.add('on');
  document.querySelectorAll('.nav button').forEach(b=>b.classList.toggle('on', b.dataset.p===p));
  document.getElementById('scroll').scrollTop=0;
  current=p; render();
}
function toast(msg){
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('on');
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('on'),1900);
}
function cycleTheme(){
  const i=(THEMES.indexOf(S.theme)+1)%THEMES.length; S.theme=THEMES[i];
  document.getElementById('app').dataset.theme=S.theme; save();
  toast('עיצוב: '+({clean:'מודרני',vivid:'צבעוני',luxe:'יוקרתי'})[S.theme]);
}
function openModal(html){ document.getElementById('modal').innerHTML=html;
  document.getElementById('modalBg').classList.add('on'); }
function closeModal(){ document.getElementById('modalBg').classList.remove('on'); }

function dayAppts(d){ return S.appointments.filter(a=>a.date===d).sort((a,b)=>a.time.localeCompare(b.time)); }
function revenue(d){ return dayAppts(d).reduce((s,a)=>s+a.price,0); }
function monthRevenue(){ const m=todayISO.slice(0,7);
  return S.appointments.filter(a=>a.date.slice(0,7)===m).reduce((s,a)=>s+a.price,0); }

function renderHome(){
  const list=dayAppts(todayISO);
  const upcoming=list.filter(a=>!a.done);
  document.getElementById('p-home').innerHTML = `
    <div class="hero"><div class="deco"></div>
      <h3>הכנסות היום</h3>
      <div class="big">${ils(revenue(todayISO))}</div>
      <div class="mini"><span>● ${list.length} תורים</span>
        <span>● ${list.filter(a=>a.done).length} הושלמו</span>
        <span>● ${S.portfolio.length} עבודות</span></div>
    </div>
    <div class="sec-title">סטטיסטיקה</div>
    <div class="stat-row">
      <div class="card stat"><div class="v">${monthRevenue()>=1000?(monthRevenue()/1000).toFixed(1)+'K':monthRevenue()}</div>
        <div class="l">הכנסות החודש (₪)</div><div class="chip">${S.appointments.length} תורים</div></div>
      <div class="card stat"><div class="v">4.9★</div><div class="l">דירוג ממוצע</div><div class="chip">86 ביקורות</div></div>
    </div>
    <div class="sec-title">התורים הבאים <button onclick="go('cal')">ליומן ›</button></div>
    <div>${upcoming.length?upcoming.map(apptCard).join(''):'<div class="empty">אין תורים מתוכננים להיום 🎉</div>'}</div>
    <button class="btn" onclick="apptForm()">+ קביעת תור חדש</button>`;
}
function apptCard(a){
  const ini=a.name.trim().slice(0,2);
  return `<div class="card appt ${a.done?'done':''}">
    <div class="time"><b>${a.time}</b><span>${a.dur} דק'</span></div>
    <div class="ci">${ini}</div>
    <div class="info"><b>${a.name}</b><span>${a.service}</span>
      <div class="row-actions">
        ${a.done?'<button class="mini-btn" onclick="toggleDone('+a.id+')">בטל סימון</button>'
                :'<button class="mini-btn ok" onclick="toggleDone('+a.id+')">✓ הושלם</button>'}
        <button class="mini-btn del" onclick="delAppt('+a.id+')">מחק</button>
      </div></div>
    <div class="price">${ils(a.price)}</div></div>`;
}
function toggleDone(id){ const a=S.appointments.find(x=>x.id===id); a.done=!a.done; save(); render(); }
function delAppt(id){ S.appointments=S.appointments.filter(x=>x.id!==id); save(); render(); toast('התור נמחק'); }

function apptForm(){
  openModal(`
    <h2>תור חדש</h2><div class="sub">מלאו את פרטי הלקוח/ה והשירות</div>
    <div class="field"><label>שם הלקוח/ה</label><input id="f_name" placeholder="לדוגמה: מיכל אבני"></div>
    <div class="field"><label>שירות</label>
      <select id="f_service">
        <option>תספורת + עיצוב</option><option>צבע + פן</option><option>גוונים / באלייאז'</option>
        <option>החלקה</option><option>תסרוקת אירוע</option><option>טיפול קרטין</option>
      </select></div>
    <div class="grid2">
      <div class="field"><label>תאריך</label><input id="f_date" type="date" value="${todayISO}"></div>
      <div class="field"><label>שעה</label><input id="f_time" type="time" value="10:00"></div>
    </div>
    <div class="grid2">
      <div class="field"><label>משך (דק')</label><input id="f_dur" type="number" value="45" min="5" step="5"></div>
      <div class="field"><label>מחיר (₪)</label><input id="f_price" type="number" value="150" min="0"></div>
    </div>
    <button class="btn" onclick="saveAppt()">שמירת התור</button>
    <button class="btn ghost" onclick="closeModal()">ביטול</button>`);
  setTimeout(()=>document.getElementById('f_name').focus(),100);
}
function saveAppt(){
  const name=document.getElementById('f_name').value.trim();
  if(!name){ toast('נא להזין שם לקוח/ה'); return; }
  const date=document.getElementById('f_date').value||todayISO;
  S.appointments.push({ id:nid(S.appointments), name,
    service:document.getElementById('f_service').value, date,
    time:document.getElementById('f_time').value||'10:00',
    dur:+document.getElementById('f_dur').value||45,
    price:+document.getElementById('f_price').value||0, done:false });
  save(); closeModal(); toast('✓ התור נוסף'); selDay=date; render();
}

function renderCal(){
  const days=[]; const base=new Date();
  for(let i=0;i<7;i++){ const d=new Date(base); d.setDate(base.getDate()+i); days.push(d); }
  const names=['א׳','ב׳','ג׳','ד׳','ה׳','ו׳','ש׳'];
  const dayCells=days.map(d=>{ const iso=d.toISOString().slice(0,10);
    const c=dayAppts(iso).length;
    return `<div class="day ${iso===selDay?'on':''}" onclick="selDay='${iso}';render()">
      <span>${names[d.getDay()]}</span><b>${d.getDate()}</b>
      <div class="cnt">${c?c+' תור':''}</div></div>`; }).join('');
  const list=dayAppts(selDay);
  document.getElementById('p-cal').innerHTML=`
    <div class="sec-title">יומן תורים</div>
    <div class="week">${dayCells}</div>
    <div class="sec-title">${fmtDate(selDay)} · ${ils(revenue(selDay))}</div>
    <div>${list.length?list.map(apptCard).join(''):'<div class="empty">אין תורים ביום זה</div>'}</div>
    <button class="btn" onclick="apptForm()">+ קביעת תור חדש</button>`;
}
function fmtDate(iso){ const d=new Date(iso+'T00:00');
  return d.toLocaleDateString('he-IL',{weekday:'long',day:'numeric',month:'long'}); }

function renderPort(){
  const cats=['הכל','צבע','תספורות','החלקות','אירועים'];
  const tabs=cats.map(c=>`<button class="pf-tab ${c===pfFilter?'on':''}" onclick="pfFilter='${c}';render()">${c}</button>`).join('');
  const items=S.portfolio.filter(p=>pfFilter==='הכל'||p.cat===pfFilter);
  const shots=items.map(p=>`<div class="shot">
      <div class="ph" style="background:${p.grad}"></div>
      <button class="x" onclick="delWork(${p.id})">×</button>
      <div class="cap"><b>${p.title}</b><span>${p.cat}</span></div></div>`).join('');
  document.getElementById('p-port').innerHTML=`
    <div class="sec-title">הפורטפוליו שלי</div>
    <div class="pf-tabs">${tabs}</div>
    <div class="gallery">${shots||'<div class="empty">אין עבודות בקטגוריה זו</div>'}</div>
    <button class="btn" onclick="workForm()">📷 הוספת עבודה חדשה</button>`;
}
function workForm(){
  pickedGrad=GRADS[0];
  openModal(`
    <h2>עבודה חדשה</h2><div class="sub">הוסיפו פריט לפורטפוליו</div>
    <div class="field"><label>כותרת</label><input id="w_title" placeholder="לדוגמה: באלייאז' קיצי"></div>
    <div class="field"><label>קטגוריה</label>
      <select id="w_cat"><option>צבע</option><option>תספורות</option><option>החלקות</option><option>אירועים</option></select></div>
    <div class="field"><label>צבע רקע</label>
      <div class="swatches" id="w_sw">${GRADS.map((g,i)=>`<div class="sw ${i===0?'on':''}" style="background:${g}" onclick="pickGrad(${i},this)"></div>`).join('')}</div></div>
    <button class="btn" onclick="saveWork()">הוספה לפורטפוליו</button>
    <button class="btn ghost" onclick="closeModal()">ביטול</button>`);
}
function pickGrad(i,el){ pickedGrad=GRADS[i];
  document.querySelectorAll('#w_sw .sw').forEach(s=>s.classList.remove('on')); el.classList.add('on'); }
function saveWork(){
  const title=document.getElementById('w_title').value.trim();
  if(!title){ toast('נא להזין כותרת'); return; }
  S.portfolio.unshift({ id:nid(S.portfolio), title, cat:document.getElementById('w_cat').value, grad:pickedGrad });
  save(); closeModal(); toast('✓ העבודה נוספה'); render();
}
function delWork(id){ S.portfolio=S.portfolio.filter(p=>p.id!==id); save(); render(); toast('העבודה הוסרה'); }

function renderBiz(){
  const labels=['ינו׳','פבר׳','מרץ','אפר׳','מאי','יוני'];
  const vals=[55,68,60,82,74, Math.min(100, 60+Math.round(monthRevenue()/200))];
  const expenses=Math.round(monthRevenue()*0.24);
  const bars=labels.map((l,i)=>`<div class="bar" style="height:${vals[i]}%"><span>${l}</span></div>`).join('');
  const inv=S.inventory.map(it=>{ const pct=Math.round(it.qty/it.max*100); const low=it.qty<=3;
    return `<div class="inv"><div class="ic">${it.icon}</div>
      <div class="info"><b>${it.name}</b>
        <span class="${low?'low':''}">נשארו ${it.qty} יח'${low?' — להזמין!':''}</span>
        <div class="bar-mini"><i style="width:${pct}%"></i></div></div>
      <div class="inv-btns">
        <button class="stepper" onclick="invStep(${it.id},1)">+</button>
        <button class="stepper" onclick="invStep(${it.id},-1)">−</button></div></div>`; }).join('');
  document.getElementById('p-biz').innerHTML=`
    <div class="sec-title">ניהול העסק</div>
    <div class="stat-row" style="margin-bottom:12px">
      <div class="card stat"><div class="v">${ils(monthRevenue())}</div><div class="l">הכנסות החודש</div><div class="chip">${S.appointments.length} תורים</div></div>
      <div class="card stat"><div class="v">${ils(expenses)}</div><div class="l">הוצאות משוערות</div><div class="chip">מלאי + שכ"ד</div></div>
    </div>
    <div class="card" style="padding:14px 12px 30px">
      <div class="sec-title" style="margin:4px 4px 0">הכנסות 6 חודשים</div>
      <div class="bars">${bars}</div>
    </div>
    <div class="sec-title">מלאי מוצרים <button onclick="invForm()">+ מוצר</button></div>
    <div class="card">${inv}</div>`;
}
function invStep(id,d){ const it=S.inventory.find(x=>x.id===id);
  it.qty=Math.max(0,Math.min(it.max,it.qty+d)); save(); render(); }
function invForm(){
  openModal(`
    <h2>מוצר חדש</h2><div class="sub">הוספה למלאי</div>
    <div class="field"><label>שם המוצר</label><input id="i_name" placeholder="לדוגמה: ספריי הגנה"></div>
    <div class="grid2">
      <div class="field"><label>כמות נוכחית</label><input id="i_qty" type="number" value="10" min="0"></div>
      <div class="field"><label>כמות מלאה</label><input id="i_max" type="number" value="20" min="1"></div>
    </div>
    <div class="field"><label>אייקון</label>
      <select id="i_icon"><option>🧴</option><option>🧪</option><option>💆‍♀️</option><option>✂️</option><option>🪮</option><option>💈</option></select></div>
    <button class="btn" onclick="saveInv()">הוספה למלאי</button>
    <button class="btn ghost" onclick="closeModal()">ביטול</button>`);
}
function saveInv(){
  const name=document.getElementById('i_name').value.trim();
  if(!name){ toast('נא להזין שם מוצר'); return; }
  S.inventory.push({ id:nid(S.inventory), name, icon:document.getElementById('i_icon').value,
    qty:+document.getElementById('i_qty').value||0, max:+document.getElementById('i_max').value||20 });
  save(); closeModal(); toast('✓ המוצר נוסף'); render();
}

const RECO = {
  'אובלי':[
    {t:'לוֹב באורך כתף', p:'מחמיא לקו הלסת ומוסיף נפח בצדדים', m:97, g:GRADS[2]},
    {t:"באלייאז' חמים", p:'גוונים זהובים שמאירים את גוון העור', m:93, g:GRADS[1]},
    {t:'גלים עם פיתול רך', p:'תנועה טבעית שמרככת את הפרופורציות', m:88, g:GRADS[3]}
  ],
  'מרובע':[
    {t:'שכבות ארוכות ורכות', p:'מעגלות את קו הלסת החזק', m:95, g:GRADS[5]},
    {t:'פוני צד אלכסוני', p:'שובר את הקווים הישרים של הפנים', m:90, g:GRADS[0]},
    {t:'גלים מהלסת ומטה', p:'מוסיפים עיגול ורכות לתחתית', m:86, g:GRADS[4]}
  ],
  'עגול':[
    {t:'בוב א-סימטרי', p:'מאריך אופטית ומחדד את הפנים', m:96, g:GRADS[6]},
    {t:'נפח בקודקוד', p:'מוסיף גובה ומאזן את העיגול', m:91, g:GRADS[7]},
    {t:'גוונים כהים בצדדים', p:'אפקט מצר ומעצב', m:85, g:GRADS[3]}
  ]
};
function renderStyle(){
  const faces=[
    {k:'אובלי',svg:'<ellipse cx="20" cy="25" rx="13" ry="21" fill="none" stroke="CUR" stroke-width="2.5"/>'},
    {k:'מרובע',svg:'<rect x="7" y="6" width="26" height="38" rx="6" fill="none" stroke="CUR" stroke-width="2.5"/>'},
    {k:'עגול',svg:'<circle cx="20" cy="25" r="16" fill="none" stroke="CUR" stroke-width="2.5"/>'}
  ];
  const fc=faces.map(f=>{ const on=f.k===faceSel;
    return `<div class="face ${on?'on':''}" onclick="faceSel='${f.k}';render()">
      <svg viewBox="0 0 40 50">${f.svg.replace('CUR', on?'var(--accent)':'var(--text-soft)')}</svg>
      <span>${f.k}</span></div>`; }).join('');
  const recos=RECO[faceSel].map(r=>`<div class="card reco">
      <div class="ph" style="background:${r.g}"></div>
      <div class="info"><b>${r.t}</b><p>${r.p}</p></div>
      <div class="match">${r.m}%</div></div>`).join('');
  document.getElementById('p-style').innerHTML=`
    <div class="sec-title">התאמת סגנון ללקוח</div>
    <p style="font-size:13px;color:var(--text-soft);margin:0 4px 14px;line-height:1.5">בחרו את מבנה הפנים — נציע תספורות וצבעים שמתאימים ביותר.</p>
    <div style="font-size:12px;font-weight:800;margin:0 4px 8px">מבנה פנים</div>
    <div class="faces">${fc}</div>
    <div class="sec-title">המלצות ✦ פנים ${faceSel}</div>
    ${recos}
    <button class="btn" onclick="sendReco()">💬 שליחת ההמלצות ללקוח/ה</button>`;
}
function sendReco(){
  openModal(`
    <h2>שליחת המלצות 💬</h2>
    <div class="sub">בחרו ערוץ לשליחת ${RECO[faceSel].length} ההמלצות לפנים ${faceSel}</div>
    <button class="btn" onclick="closeModal();toast('✓ נשלח בוואטסאפ')">שליחה בוואטסאפ</button>
    <button class="btn ghost" onclick="closeModal();toast('✓ נשלח באימייל')">שליחה באימייל</button>
    <button class="btn ghost" onclick="closeModal()">ביטול</button>`);
}

function render(){
  if(current==='home') renderHome();
  else if(current==='cal') renderCal();
  else if(current==='port') renderPort();
  else if(current==='biz') renderBiz();
  else if(current==='style') renderStyle();
}
function fabAction(){
  if(current==='port') workForm();
  else if(current==='biz') invForm();
  else apptForm();
}

(function init(){
  document.getElementById('app').dataset.theme=S.theme;
  const h=new Date().getHours();
  document.getElementById('greet').textContent = h<12?'בוקר טוב 👋':h<18?'צהריים טובים 👋':'ערב טוב 👋';
  render();
})();
</script>
</body>
</html>
